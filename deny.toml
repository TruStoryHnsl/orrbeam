# cargo-deny configuration for orrbeam
# Run: cargo deny check licenses
# Install: cargo install cargo-deny

[graph]
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-apple-darwin" },
    { triple = "x86_64-pc-windows-msvc" },
]

[advisories]
# Check against the RustSec advisory database.
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]

[licenses]
version = 2
# Allowed licenses — all OSS-compatible, non-copyleft or weak-copyleft.
# MPL-2.0 is weak copyleft (file-level) and is allowed in binary distribution.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "CC0-1.0",
    # Weak copyleft — file-level only; acceptable for binary distribution.
    "MPL-2.0",
    # Unicode License v3 — OSI approved, used by ICU data crates.
    "Unicode-3.0",
    # Unicode DFS 2016 — data-file license, non-copyleft.
    "Unicode-DFS-2016",
]
confidence-threshold = 0.8

[bans]
# Warn on multiple versions of the same crate to keep the dep tree lean.
multiple-versions = "warn"

[sources]
# Only allow crates from crates.io; deny unknown registries and git sources.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
